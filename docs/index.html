<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>SoulCap — a quiet place to steady yourself</title>
<meta name="description" content="Skills for hard moments. Works offline, stays on your device. Not therapy, not a crisis service."/>
<meta name="color-scheme" content="light dark"/>
<meta name="theme-color" content="#F2F1EC" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#10120F" media="(prefers-color-scheme: dark)"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="SoulCap"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png"/>
<script>
/* Apply stored theme before first paint so there is no flash. */
(function(){try{var t=localStorage.getItem('soulcap_theme');
if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
<link rel="stylesheet" href="app.css"/>
</head>
<body>

<a class="sr" href="#view-now">Skip to content</a>

<div id="app">

  <p id="offline" class="offline-tag" hidden>Offline — everything here still works.</p>

  <main id="views">
    <section id="view-onboarding" class="view" aria-label="Getting started"></section>
    <section id="view-now"        class="view" aria-label="Now"></section>
    <section id="view-skills"     class="view" aria-label="Skills"></section>
    <section id="view-map"        class="view" aria-label="Constellation"></section>
    <section id="view-me"         class="view" aria-label="About you"></section>
  </main>

  <nav id="tabs" role="tablist" aria-label="Main">
    <button data-tab="now" role="tab" aria-selected="true" aria-controls="view-now">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      Now
    </button>
    <button data-tab="skills" role="tab" aria-selected="false" aria-controls="view-skills">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      Skills
    </button>
    <button data-tab="map" role="tab" aria-selected="false" aria-controls="view-map">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="12" r="2.6"/><circle cx="12" cy="12" r="9"/><circle cx="12" cy="3" r="1.6" fill="currentColor"/><circle cx="20" cy="15" r="1.6" fill="currentColor"/></svg>
      Constellation
    </button>
    <button data-tab="me" role="tab" aria-selected="false" aria-controls="view-me">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8.5" r="3.5"/><path d="M5 20c1.2-3.6 4-5.4 7-5.4s5.8 1.8 7 5.4"/></svg>
      You
    </button>
  </nav>
</div>

<!-- ── Help now ──────────────────────────────────────────────── -->
<div id="panic" role="dialog" aria-modal="true" aria-label="Help now" aria-hidden="true">
  <div>
    <p id="panicStep" class="panic-step">Step 1 of 4</p>
    <p id="panicInstruction" class="panic-instruction">Breathe in, slowly.</p>
  </div>
  <div class="pacer-hold">
    <div id="pacer" class="pacer"><span id="pacerCount" class="pacer-count">4</span></div>
  </div>
  <p class="panic-sub">Nothing to get right. Follow the circle if it helps, ignore it if it doesn’t.</p>
  <div id="panicLinks" class="stack"></div>
  <button id="panicExit" class="btn quiet">I’m okay — go back</button>
</div>

<!-- ── Skill runner ──────────────────────────────────────────── -->
<div id="runner" role="dialog" aria-modal="true" aria-label="Exercise" aria-hidden="true">
  <p id="runStep" class="run-step">Step 1</p>
  <p id="runText" class="run-text"></p>
  <div id="runActions" class="stack"></div>
  <button id="runClose" class="sr">Close exercise</button>
</div>

<!-- ── Sheet ─────────────────────────────────────────────────── -->
<div id="sheet" role="dialog" aria-modal="true" aria-hidden="true">
  <div id="sheetScrim" class="scrim"></div>
  <div id="sheetPanel" class="panel"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
