<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>SoulCap — a quiet place to steady yourself</title>
<meta name="description" content="Techniques that work in a few minutes. Works offline, stays on your device. Not therapy, not a crisis service."/>
<meta name="color-scheme" content="light dark"/>
<meta name="theme-color" content="#F6F2EC" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#16131A" media="(prefers-color-scheme: dark)"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="SoulCap"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png"/>
<script>
/* Apply stored theme before first paint so there is no flash. */
(function(){try{var t=localStorage.getItem('soulcap_theme');
if(t==='light'||t==='dark'||t==='night')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
<link rel="stylesheet" href="app.css"/>
</head>
<body>

<a class="sr" href="#views">Skip to content</a>

<!-- ── Splash ────────────────────────────────────────────────── -->
<div id="splash" aria-hidden="true">
  <div class="halo"></div>
  <img class="mark" src="icons/mark.svg" alt="" width="84" height="84"/>
  <p class="word">SoulCap</p>
  <p class="tag">A quiet place to steady yourself</p>
</div>

<div id="app">

  <p id="offline" class="offline-tag" hidden>Offline — everything here still works.</p>

  <main id="views">
    <section id="view-welcome"    class="view" aria-label="Welcome"></section>
    <section id="view-onboarding" class="view" aria-label="Getting started"></section>
    <section id="view-now"        class="view" aria-label="Now"></section>
    <section id="view-calm"       class="view" aria-label="Calm"></section>
    <section id="view-skills"     class="view" aria-label="Techniques"></section>
    <section id="view-map"        class="view" aria-label="Constellation"></section>
    <section id="view-me"         class="view" aria-label="About you"></section>
  </main>

  <nav id="tabs" role="tablist" aria-label="Main">
    <button data-tab="now" role="tab" aria-selected="true" aria-controls="view-now">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      Now
    </button>
    <button data-tab="calm" role="tab" aria-selected="false" aria-controls="view-calm">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><path d="M3 12c3.5 0 3.5-4 7-4s3.5 4 7 4 3.5-2 4-2"/><path d="M3 17c3.5 0 3.5-3 7-3s3.5 3 7 3 3.5-1.5 4-1.5"/></svg>
      Calm
    </button>
    <button data-tab="skills" role="tab" aria-selected="false" aria-controls="view-skills">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      Techniques
    </button>
    <button data-tab="map" role="tab" aria-selected="false" aria-controls="view-map">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true"><circle cx="12" cy="12" r="2.6"/><circle cx="12" cy="12" r="9"/><circle cx="12" cy="3" r="1.6" fill="currentColor"/><circle cx="20" cy="15" r="1.6" fill="currentColor"/></svg>
      Constellation
    </button>
    <button data-tab="me" role="tab" aria-selected="false" aria-controls="view-me">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8.5" r="3.5"/><path d="M5 20c1.2-3.6 4-5.4 7-5.4s5.8 1.8 7 5.4"/></svg>
      You
    </button>
  </nav>
</div>

<!-- Persistent help — reachable from every tab in one tap -->
<button id="fab" aria-label="I need help now">
  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a7 7 0 0 0-4 12.7V18h8v-2.3A7 7 0 0 0 12 3z"/><path d="M10 21h4"/></svg>
  Help
</button>

<!-- ── Help now ──────────────────────────────────────────────── -->
<div id="panic" role="dialog" aria-modal="true" aria-label="Help now" aria-hidden="true">
  <div>
    <p id="panicStep" class="panic-step">Step 1 of 4</p>
    <p id="panicInstruction" class="panic-instruction">Breathe in, slowly.</p>
  </div>
  <div class="pacer-hold">
    <div id="pacerRing" class="pacer-ring"></div>
    <div id="pacer" class="pacer"><span id="pacerCount" class="pacer-count">4</span></div>
  </div>
  <p class="panic-sub">Nothing to get right. Follow the circle if it helps, ignore it if it doesn’t.</p>
  <div id="panicLinks" class="stack"></div>
  <button id="panicExit" class="btn quiet">I’m okay — go back</button>
</div>

<!-- ── Exercise runner — the app moves through it with you ────── -->
<div id="runner" role="dialog" aria-modal="true" aria-label="Exercise" aria-hidden="true">
  <div class="run-top">
    <p id="runStep" class="run-step"></p>
    <button id="runGuide" class="run-guide" aria-pressed="false">
      <svg id="runGuideIcon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
      <span id="runGuideLabel">Guide me</span>
    </button>
  </div>
  <div id="runProgress" class="run-progress"></div>
  <div class="run-stage">
    <div class="run-orb-hold">
      <div id="runOrbRing" class="run-orb-ring"></div>
      <div id="runOrb" class="run-orb"><span id="runOrbCount" class="run-orb-count"></span></div>
    </div>
    <p id="runText" class="run-text"></p>
    <p id="runWhy" class="run-why"></p>
  </div>
  <div id="runActions" class="stack"></div>
  <button id="runClose" class="sr">Close exercise</button>
</div>

<!-- ── Sheet ─────────────────────────────────────────────────── -->
<div id="sheet" role="dialog" aria-modal="true" aria-hidden="true">
  <div id="sheetScrim" class="scrim"></div>
  <div id="sheetPanel" class="panel"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
