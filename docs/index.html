<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>SoulCap — a quiet place to steady yourself</title>
<meta name="description" content="Techniques that work in a few minutes, a private journal, and a map of the people around you. Works offline, stays on your device. Not therapy."/>
<meta name="color-scheme" content="light dark"/>
<meta name="theme-color" content="#F6F2EC" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#16131A" media="(prefers-color-scheme: dark)"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="SoulCap"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png"/>
<script>
/* Apply stored theme before first paint so there is no flash. */
(function(){try{var t=localStorage.getItem('soulcap_theme');
if(t==='light'||t==='dark'||t==='night')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
<link rel="stylesheet" href="app.css"/>
</head>
<body>

<a class="sr" href="#views">Skip to content</a>

<!-- ── Splash ────────────────────────────────────────────────── -->
<div id="splash" aria-hidden="true">
  <div class="halo"></div>
  <img class="mark" src="icons/mark.svg" alt="" width="84" height="84"/>
  <p class="word">SoulCap</p>
  <p class="tag">A quiet place to steady yourself</p>
</div>

<div id="app">

  <p id="offline" class="offline-tag" hidden>Offline — everything here still works.</p>

  <main id="views">
    <section id="view-welcome"    class="view" aria-label="Welcome"></section>
    <section id="view-onboarding" class="view" aria-label="Getting started"></section>
    <section id="view-now"        class="view" aria-label="Now"></section>
    <section id="view-calm"       class="view" aria-label="Calm"></section>
    <section id="view-journal"    class="view" aria-label="Journal"></section>
    <section id="view-map"        class="view" aria-label="People"></section>
    <section id="view-me"         class="view" aria-label="You"></section>
  </main>

  <nav id="tabs" role="tablist" aria-label="Main">
    <button data-tab="now" role="tab" aria-selected="true" aria-controls="view-now">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <span>Now</span>
    </button>
    <button data-tab="calm" role="tab" aria-selected="false" aria-controls="view-calm">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><path d="M3 12c3.5 0 3.5-4 7-4s3.5 4 7 4 3.5-2 4-2"/><path d="M3 17c3.5 0 3.5-3 7-3s3.5 3 7 3 3.5-1.5 4-1.5"/></svg>
      <span>Calm</span>
    </button>
    <button data-tab="journal" role="tab" aria-selected="false" aria-controls="view-journal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h11a2 2 0 0 1 2 2v14l-3-2-3 2-3-2-3 2V6a2 2 0 0 1 2-2z"/><path d="M8 8h7M8 12h7"/></svg>
      <span>Journal</span>
    </button>
    <button data-tab="map" role="tab" aria-selected="false" aria-controls="view-map">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true"><circle cx="12" cy="12" r="2.4"/><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="3.5" r="1.5" fill="currentColor"/><circle cx="19.5" cy="15" r="1.5" fill="currentColor"/></svg>
      <span>People</span>
    </button>
    <button data-tab="me" role="tab" aria-selected="false" aria-controls="view-me">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8.5" r="3.5"/><path d="M5 20c1.2-3.6 4-5.4 7-5.4s5.8 1.8 7 5.4"/></svg>
      <span>You</span>
    </button>
  </nav>
</div>

<!-- Persistent help — reachable from every tab in one tap -->
<button id="fab" aria-label="I need help now">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a7 7 0 0 0-4 12.7V18h8v-2.3A7 7 0 0 0 12 3z"/><path d="M10 21h4"/></svg>
  Help
</button>

<!-- ── Help now ──────────────────────────────────────────────── -->
<div id="panic" role="dialog" aria-modal="true" aria-label="Help now" aria-hidden="true">
  <div>
    <p id="panicStep" class="panic-step">Step 1 of 4</p>
    <p id="panicInstruction" class="panic-instruction">Breathe in, slowly.</p>
  </div>
  <div class="pacer-hold">
    <div id="pacerRing" class="pacer-ring"></div>
    <div id="pacer" class="pacer"><span id="pacerCount" class="pacer-count">4</span></div>
  </div>
  <p class="panic-sub">Nothing to get right. Follow the circle if it helps, ignore it if it doesn’t.</p>
  <div id="panicLinks" class="stack"></div>
  <button id="panicExit" class="btn quiet">I’m okay — go back</button>
</div>

<!-- ── Exercise runner — walks the whole exercise with you ────── -->
<div id="runner" role="dialog" aria-modal="true" aria-label="Exercise" aria-hidden="true">
  <div class="run-top">
    <p id="runStep" class="run-step"></p>
    <button id="runGuide" class="run-guide" aria-pressed="false">
      <svg id="runGuideIcon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
      <span id="runGuideLabel">Guide me</span>
    </button>
  </div>
  <div id="runProgress" class="run-progress"></div>
  <div class="run-stage">
    <div class="run-orb-hold">
      <div id="runOrbRing" class="run-orb-ring"></div>
      <div id="runOrb" class="run-orb"><span id="runOrbCount" class="run-orb-count"></span></div>
    </div>
    <p id="runText" class="run-text"></p>
    <p id="runMeta" class="run-meta"></p>
    <p id="runWhy" class="run-why"></p>
  </div>
  <div id="runActions" class="stack"></div>
  <button id="runClose" class="sr">Close exercise</button>
</div>

<!-- ── Journal editor ────────────────────────────────────────── -->
<div id="journalEditor" role="dialog" aria-modal="true" aria-label="Journal entry" aria-hidden="true">
  <div class="je-top">
    <button id="jeCancel" class="btn quiet" style="width:auto">Close</button>
    <span id="jeDate" class="je-date"></span>
    <button id="jeSave" class="btn" style="width:auto;padding:11px 20px;min-height:44px">Save</button>
  </div>
  <div class="je-paper">
    <input id="jeTitle" class="je-title" type="text" placeholder="Title (optional)" aria-label="Title"/>
    <div id="jePrompt" class="je-prompt"></div>
    <textarea id="jeBody" class="je-body" placeholder="Write anything. Nobody else will ever read this." aria-label="Journal entry"></textarea>
    <div id="jePhotos" class="je-photos"></div>
  </div>
  <div class="je-tools">
    <button id="jePhotoBtn" class="je-tool" aria-label="Attach a photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 16l-5-5L5 21"/></svg>
    </button>
    <button id="jePromptBtn" class="je-tool" aria-label="Give me a prompt">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.5 9a2.5 2.5 0 1 1 3 2.4c-.8.3-1.5.9-1.5 1.8v.3"/><circle cx="11.6" cy="17" r=".6" fill="currentColor"/></svg>
    </button>
    <div id="jeMoodWrap" class="je-mood"></div>
  </div>
  <input id="jeFile" type="file" accept="image/*" hidden/>
</div>

<!-- ── Sheet ─────────────────────────────────────────────────── -->
<div id="sheet" role="dialog" aria-modal="true" aria-hidden="true">
  <div id="sheetScrim" class="scrim"></div>
  <div id="sheetPanel" class="panel"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
