<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SoulCap — Screen Gallery</title>
  <style>
    :root {
      --bg: #16131A;
      --surface: #1E1A24;
      --border: #3A3344;
      --text: #F4F1F8;
      --muted: #A89BB8;
      --accent: #6C5CE7;
      --accent-dim: rgba(108, 92, 231, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(22, 19, 26, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }
    h1 { margin: 0 0 4px; font-size: 1.35rem; font-weight: 650; }
    .sub { color: var(--muted); font-size: 0.85rem; margin: 0 0 12px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 8px; }
    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      min-height: 44px;
    }
    .btn.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    main { padding: 20px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .grid.desktop-view { grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); }
    figure {
      margin: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: zoom-in;
    }
    figure img { width: 100%; display: block; }
    figcaption { padding: 10px 12px; font-size: 0.8rem; }
    figcaption .route { color: var(--muted); font-family: ui-monospace, monospace; font-size: 0.72rem; }
    #lightbox {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0, 0, 0, 0.92);
      display: none; align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 94vw; max-height: 94vh; border-radius: 8px; }
    .empty { color: var(--muted); padding: 40px; text-align: center; }
    a.back { color: var(--accent); text-decoration: none; font-size: 0.85rem; }
    label.field { color: var(--muted); font-size: 0.75rem; display: flex; flex-direction: column; gap: 4px; }
    select.btn { appearance: auto; }
  </style>
</head>
<body>
  <header>
    <a class="back" href="docs/?demo=1">← Open app</a>
    <h1>SoulCap — Screen Gallery</h1>
    <p class="sub" id="meta">Loading manifest…</p>
    <div class="toolbar" id="filters-viewport"></div>
    <div class="toolbar" id="filters-pack"></div>
    <div class="toolbar" id="filters-variant"></div>
  </header>
  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden>
      No screenshots yet. Run <code>npm run gallery</code> first.
    </div>
  </main>
  <div id="lightbox"><img alt="" /></div>
  <script>
    var DIR = 'docs/screenshots/gallery/';
    var grid = document.getElementById('grid');
    var meta = document.getElementById('meta');
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = lightbox.querySelector('img');
    var shots = [];
    var viewport = 'all';
    var pack = 'all';
    var variant = 'all';
    var query = '';

    function unique(arr) {
      var out = [];
      var seen = {};
      arr.forEach(function (x) {
        if (!x || seen[x]) return;
        seen[x] = 1;
        out.push(x);
      });
      return out;
    }

    function filtered() {
      var q = query.trim().toLowerCase();
      return shots.filter(function (s) {
        if (viewport !== 'all' && s.viewport !== viewport) return false;
        if (pack !== 'all' && (s.pack || 'default') !== pack) return false;
        if (variant !== 'all' && (s.variant || 'default') !== variant) return false;
        if (!q) return true;
        return (s.label + ' ' + s.route + ' ' + s.file + ' ' + (s.variant || '') + ' ' + (s.pack || ''))
          .toLowerCase()
          .indexOf(q) !== -1;
      });
    }

    function render() {
      grid.className = 'grid' + (viewport === 'desktop' ? ' desktop-view' : '');
      grid.innerHTML = '';
      var visible = filtered();
      document.getElementById('empty').hidden = visible.length > 0;
      meta.textContent = meta.dataset.base + ' · showing ' + visible.length;
      visible.forEach(function (s) {
        var fig = document.createElement('figure');
        var img = document.createElement('img');
        img.loading = 'lazy';
        img.src = DIR + s.file;
        img.alt = s.label;
        var cap = document.createElement('figcaption');
        cap.innerHTML =
          '<strong>' + s.label + '</strong><br /><span class="route">' +
          s.viewport + ' · ' + (s.pack || 'default') + ' · ' + (s.variant || 'default') + ' · ' + s.route +
          '</span>';
        fig.appendChild(img);
        fig.appendChild(cap);
        fig.addEventListener('click', function () {
          lightboxImg.src = img.src;
          lightbox.classList.add('open');
        });
        grid.appendChild(fig);
      });
    }

    function btnRow(hostId, values, current, setFn, labelFn) {
      var host = document.getElementById(hostId);
      host.innerHTML = '';
      values.forEach(function (v) {
        var btn = document.createElement('button');
        btn.className = 'btn' + (v === current ? ' active' : '');
        btn.textContent = labelFn ? labelFn(v) : v;
        btn.addEventListener('click', function () {
          setFn(v);
          renderFilters();
          render();
        });
        host.appendChild(btn);
      });
    }

    function renderFilters() {
      btnRow('filters-viewport', ['all', 'mobile', 'desktop'], viewport, function (v) { viewport = v; }, function (v) {
        return v.charAt(0).toUpperCase() + v.slice(1);
      });

      var packs = ['all'].concat(unique(shots.map(function (s) { return s.pack || 'default'; })));
      btnRow('filters-pack', packs, pack, function (v) { pack = v; variant = 'all'; }, function (v) {
        if (v === 'all') return 'All packs';
        if (v === 'default') return 'Default screens';
        if (v === 'theme') return 'Themes';
        if (v === 'appearance') return 'Appearance';
        return v;
      });

      var variants = ['all'];
      shots.forEach(function (s) {
        if (pack !== 'all' && (s.pack || 'default') !== pack) return;
        if (s.variant) variants.push(s.variant);
      });
      variants = unique(variants);
      var host = document.getElementById('filters-variant');
      host.innerHTML = '';
      var lab = document.createElement('label');
      lab.className = 'field';
      lab.textContent = 'Variant';
      var sel = document.createElement('select');
      sel.className = 'btn';
      variants.forEach(function (v) {
        var opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v === 'all' ? 'All variants' : v;
        if (v === variant) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function () {
        variant = sel.value;
        render();
      });
      lab.appendChild(sel);
      host.appendChild(lab);

      var search = document.createElement('input');
      search.type = 'search';
      search.placeholder = 'Filter screens…';
      search.className = 'btn';
      search.style.minWidth = '180px';
      search.value = query;
      search.addEventListener('input', function () { query = search.value; render(); });
      host.appendChild(search);
    }

    lightbox.addEventListener('click', function () { lightbox.classList.remove('open'); });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') lightbox.classList.remove('open');
    });

    fetch(DIR + 'gallery-manifest.json')
      .then(function (r) { return r.json(); })
      .then(function (m) {
        shots = (m.shots || []).map(function (s) {
          if (!s.pack) s.pack = 'default';
          if (!s.variant) s.variant = 'default';
          return s;
        });
        meta.dataset.base = 'v' + m.version + ' · ' + shots.length + ' shots · generated ' + new Date(m.generated).toLocaleString();
        meta.textContent = meta.dataset.base;
        renderFilters();
        render();
      })
      .catch(function () {
        meta.textContent = 'Manifest missing.';
        document.getElementById('empty').hidden = false;
      });
  </script>
</body>
</html>
