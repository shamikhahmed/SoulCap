<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SoulCap — Screen Gallery</title>
  <style>
    :root {
      --bg: #16131A;
      --surface: #1E1A24;
      --border: #3A3344;
      --text: #F4F1F8;
      --muted: #A89BB8;
      --accent: #6C5CE7;
      --accent-dim: rgba(108, 92, 231, 0.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(22, 19, 26, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }
    h1 { margin: 0 0 4px; font-size: 1.35rem; font-weight: 650; }
    .sub { color: var(--muted); font-size: 0.85rem; margin: 0 0 12px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      min-height: 44px;
    }
    .btn.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    main { padding: 20px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .grid.desktop-view { grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); }
    figure {
      margin: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: zoom-in;
    }
    figure img { width: 100%; display: block; }
    figcaption { padding: 10px 12px; font-size: 0.8rem; }
    figcaption .route { color: var(--muted); font-family: ui-monospace, monospace; font-size: 0.72rem; }
    #lightbox {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0, 0, 0, 0.92);
      display: none; align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 94vw; max-height: 94vh; border-radius: 8px; }
    .empty { color: var(--muted); padding: 40px; text-align: center; }
    a.back { color: var(--accent); text-decoration: none; font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <a class="back" href="docs/?demo=1">← Open app</a>
    <h1>SoulCap — Screen Gallery</h1>
    <p class="sub" id="meta">Loading manifest…</p>
    <div class="toolbar" id="filters"></div>
  </header>
  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden>
      No screenshots yet. Run <code>npm run gallery</code> first.
    </div>
  </main>
  <div id="lightbox"><img alt="" /></div>
  <script>
    var DIR = 'docs/screenshots/gallery/';
    var grid = document.getElementById('grid');
    var filters = document.getElementById('filters');
    var meta = document.getElementById('meta');
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = lightbox.querySelector('img');
    var shots = [];
    var viewport = 'all';
    var query = '';

    function render() {
      grid.className = 'grid' + (viewport === 'desktop' ? ' desktop-view' : '');
      grid.innerHTML = '';
      var q = query.trim().toLowerCase();
      var visible = shots.filter(function (s) {
        if (viewport !== 'all' && s.viewport !== viewport) return false;
        if (!q) return true;
        return (s.label + ' ' + s.route + ' ' + s.file).toLowerCase().indexOf(q) !== -1;
      });
      document.getElementById('empty').hidden = visible.length > 0;
      meta.textContent = meta.dataset.base + ' · showing ' + visible.length;
      visible.forEach(function (s) {
        var fig = document.createElement('figure');
        var img = document.createElement('img');
        img.loading = 'lazy';
        img.src = DIR + s.file;
        img.alt = s.label;
        var cap = document.createElement('figcaption');
        cap.innerHTML = '<strong>' + s.label + '</strong><br /><span class="route">' + s.viewport + ' · ' + s.route + '</span>';
        fig.appendChild(img);
        fig.appendChild(cap);
        fig.addEventListener('click', function () {
          lightboxImg.src = img.src;
          lightbox.classList.add('open');
        });
        grid.appendChild(fig);
      });
    }

    function renderFilters() {
      filters.innerHTML = '';
      ['all', 'mobile', 'desktop'].forEach(function (v) {
        var btn = document.createElement('button');
        btn.className = 'btn' + (v === viewport ? ' active' : '');
        btn.textContent = v.charAt(0).toUpperCase() + v.slice(1);
        btn.addEventListener('click', function () { viewport = v; renderFilters(); render(); });
        filters.appendChild(btn);
      });
      var search = document.createElement('input');
      search.type = 'search';
      search.placeholder = 'Filter screens…';
      search.className = 'btn';
      search.style.minWidth = '180px';
      search.value = query;
      search.addEventListener('input', function () { query = search.value; render(); });
      filters.appendChild(search);
    }

    lightbox.addEventListener('click', function () { lightbox.classList.remove('open'); });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') lightbox.classList.remove('open');
    });

    fetch(DIR + 'gallery-manifest.json')
      .then(function (r) { return r.json(); })
      .then(function (m) {
        shots = m.shots || [];
        meta.dataset.base = 'v' + m.version + ' · ' + shots.length + ' shots · generated ' + new Date(m.generated).toLocaleString();
        meta.textContent = meta.dataset.base;
        renderFilters();
        render();
      })
      .catch(function () {
        meta.textContent = 'Manifest missing.';
        document.getElementById('empty').hidden = false;
      });
  </script>
</body>
</html>
